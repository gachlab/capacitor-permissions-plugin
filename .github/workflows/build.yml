name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — lint + build + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  android:
    name: Android — unit + integration + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests (Robolectric)
        working-directory: android
        run: ./gradlew test --no-daemon
      - run: npm run build
      - name: Install example-app dependencies
        working-directory: example-app
        run: npm ci
      - name: Sync plugin into example Android project
        working-directory: example-app
        run: npx cap sync android
      - name: Build example APK
        working-directory: example-app/android
        run: ./gradlew assembleDebug --no-daemon
      - name: Build instrumented test APK
        working-directory: android
        run: ./gradlew assembleDebugAndroidTest --no-daemon
      - name: Integration + E2E on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          cores: 2
          ram-size: 4096M
          script: >-
            .github/scripts/integration-permissions.sh &&
            .github/scripts/e2e-permissions.sh
      - name: Upload logcat on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-logcat
          path: /tmp/e2e-logcat.txt

  ios:
    name: iOS — unit + e2e
    runs-on: macos-15
    timeout-minutes: 60
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for runtime, devices in d['devices'].items():
              for dev in devices:
                  if 'iPhone' in dev['name'] and dev['isAvailable']:
                      print(dev['udid'])
                      exit()
          ")
          xcodebuild test \
            -scheme GachlabCapacitorPermissions \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID"
      - run: npm run build
      - name: Install example-app dependencies
        working-directory: example-app
        run: npm ci
      - name: Sync plugin into example iOS project
        working-directory: example-app
        run: npx cap sync ios
      - name: E2E (XCUITest)
        run: .github/scripts/e2e-ios-permissions.sh
      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-xcresult
          path: /tmp/e2e-ios-results.xcresult
