name: Publish

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing for auth (not just provenance) requires npm >= 11.5.1.
      # Node 22 LTS ships with npm 10.x. We install npm@latest into an isolated
      # prefix instead of --global to avoid the bundled npm overwriting itself
      # mid-install, which intermittently corrupts the module tree (seen as
      # "Cannot find module 'promise-retry'" in our runner history).
      - name: Install npm@latest in isolated prefix
        run: |
          npm install --prefix "$RUNNER_TEMP/npm-latest" npm@latest
          echo "$RUNNER_TEMP/npm-latest/node_modules/.bin" >> "$GITHUB_PATH"
      - run: npm --version
      - run: npm ci
      - run: npm run build
      # Auth + provenance both via OIDC; Trusted Publisher must be set up at
      # https://www.npmjs.com/package/@gachlab/capacitor-permissions/access
      # → no NODE_AUTH_TOKEN needed.
      - run: npm publish --access public --provenance
